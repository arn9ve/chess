<!DOCTYPE html>
<html lang="en" class="no-js">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="keywords" content="Chess, Chessboard, Play Chess, Chesspeces, 3D Chesspieces">
    <title>Hidea Chess</title>
    <meta name="description" content="Hidea's Chess is designed by Arnove.xyz">

    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon" />



    <!--website base css settings -->
    <link rel="stylesheet" type="text/css" href="css/base.css" />

    <!--Use chessboard.js as a fallback library -->
    <link type="text/css" rel="stylesheet" href="css/chessboard.css">

    <link type="text/css" rel="stylesheet" href="css/sweetalert.css">
    <script type="text/javascript" src="js/sweetalert.min.js"></script>

    <script type="text/javascript" src="js/jquery-2.1.3.min.js"></script>

    <script type="text/javascript" src="js/three.min.js"></script>
    <script type="text/javascript" src="js/OrbitControls.js"></script>
    <script type="text/javascript" src="js/chessboard3.js"></script>

    <!--Use chessboard.js as a fallback library -->
    <script type="text/javascript" src="js/chessboard.js"></script>

    <!-- game state, move validation, PGN, etc -->
    <script type="text/javascript" src="js/chess.js"></script>

    <script type="text/javascript" src="js/raphael-min.js"></script>
    <script type="text/javascript" src="js/jquery.sonic-gauge.js"></script>

    <script type="text/javascript" src="js/play.js"></script>

</head>

<body class="">
    <div id="modeGate" class="mode-gate">
        <div class="mode-shell multiplayer-menu">
            <div class="mp-logo-card ">
                <img src="assets/img/menu-chess-figma.png" alt="Hidea Chess artwork" />
            </div>

            <div class="mp-menu-center-block">
                <div class="mp-main-card mp-main-only">
                    <h1 class="mp-main-title">Hidea's Chess</h1>
                    <div class="mp-main-art">
                        <img src="assets/img/figma-main/main-card-art.png" alt="Hidea Chess artwork" />
                    </div>
                </div>

                <div class="mode-right mp-mode-buttons" id="modeActionButtons">
                    <button id="playOfflineBtn" class="mode-btn mp-mode-btn">
                        <span class="mode-btn-icon" aria-hidden="true">
                            <img src="assets/img/figma-main/icon-person-main.svg" alt="" />
                        </span>
                        <span>Solo</span>
                    </button>

                    <button id="hostGameBtn" class="mode-btn mp-mode-btn">
                        <span class="mode-btn-icon mode-btn-icon-group mp-host-icon-main" aria-hidden="true">
                            <img src="assets/img/figma-main/icon-person-a-main.svg" alt="" />
                            <img src="assets/img/figma-main/icon-person-b-main.svg" alt="" />
                        </span>
                        <span class="mode-btn-icon mp-host-icon-sub" aria-hidden="true">
                            <img src="assets/img/figma-multi/icon-group.svg" alt="" />
                        </span>
                        <span>Multiplayer</span>
                    </button>
                </div>
            </div>

            <div class="mp-main-footer mp-main-only">
                <span>&copy;Arnove</span>
                <span>2022</span>
            </div>

            <!-- Lobby: two player blocks, single column each (label → image → name → colors) -->
            <div class="mp-players-block mp-submenu-only">
                <div class="mp-player-block mp-player-mine">
                    <p class="mp-player-label">You</p>
                    <div class="mp-piece-card mp-piece-card-mine" aria-label="Your color">
                        <div class="mp-selected-piece">
                            <img id="mpMyPieceImg" src="assets/img/figma-multi/piece-selected-primary.png" alt="" />
                        </div>
                    </div>
                    <div class="mp-player-meta">
                        <input id="mpPlayerNameInput" class="mp-name-input" type="text" maxlength="20" value="Player 1" placeholder="Your name" />
                    </div>
                </div>
                <div class="mp-player-block mp-player-opponent">
                    <p class="mp-player-label">Opponent</p>
                    <div id="mpGuestPieceCard" class="mp-piece-card mp-piece-card-faded mp-piece-card-opponent" aria-label="Opponent">
                        <div class="mp-selected-piece">
                            <img id="mpOpponentPieceImg" src="assets/img/figma-multi/piece-selected-secondary.png" alt="" />
                        </div>
                    </div>
                    <div class="mp-player-meta">
                        <p id="mpOpponentName" class="mp-opponent-name" aria-live="polite">Waiting for player…</p>
                    </div>
                </div>
            </div>

            <div class="mp-piece-strip mp-submenu-only" aria-hidden="true">
                <span class="mp-piece-wrap"><img class="mp-piece-k" src="assets/img/figma-multi/piece-k.png" alt="" /></span>
                <span class="mp-piece-wrap"><img class="mp-piece-q" src="assets/img/figma-multi/piece-q.png" alt="" /></span>
                <span class="mp-piece-wrap"><img class="mp-piece-r" src="assets/img/figma-multi/piece-r.png" alt="" /></span>
                <span class="mp-piece-wrap"><img class="mp-piece-n" src="assets/img/figma-multi/piece-n.png" alt="" /></span>
                <span class="mp-piece-wrap"><img class="mp-piece-b" src="assets/img/figma-multi/piece-b.png" alt="" /></span>
                <span class="mp-piece-wrap"><img class="mp-piece-p" src="assets/img/figma-multi/piece-p.png" alt="" /></span>
            </div>

            <!-- Status message + Copy link / Play: bottom right, multiplayer submenu only -->
            <div class="mp-status-and-actions mp-submenu-only">
                <div id="joinInfo" class="mode-join-info hide"></div>
                <div class="mp-action-row">
                    <button id="mpCopyLinkBtn" type="button" class="mp-action-btn mp-action-btn-host-only">
                        <img src="assets/img/figma-multi/icon-copy.svg" alt="" />
                        <span>Copy link</span>
                    </button>
                    <button id="mpPlayBtn" type="button" class="mp-action-btn mp-action-btn-primary mp-action-btn-disabled mp-action-btn-host-only" aria-disabled="true">
                        <img src="assets/img/figma-multi/icon-play.svg" alt="" />
                        <span>Play</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="shareToast" class="share-toast hide">
        <div class="share-toast-content">
            <div class="share-toast-link-box">
                <button id="shareToastBackBtn" class="share-toast-back">
                    <span>Play Offline</span>
                </button>
                <span class="share-toast-link" id="shareToastLink"></span>
                <button id="shareToastCopyBtn" class="share-toast-copy">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <span id="shareToastCopyText">Copy Link</span>
                </button>
            </div>
        </div>
        <div class="share-toast-status" id="shareToastStatus"></div>
    </div>
    <main>






        <div class="content">
            <div class="header">
                <div class="game-logo-card">
                    <img class="logo" src="assets/img/menu-chess-figma.png" alt="Hidea Chess logo" />
                </div>

                <div class="game-status-stack">
                    <div class="status">
                        <span id="status">White Turn</span>
                    </div>
                    <div class="game-mode-card">
                        <div class="game-mode-item" id="lastMoveOne">
                            <img id="lastMoveOneIcon" src="img/chesspieces/alpha/wP.png" alt="" />
                            <span id="lastMoveOneText">--</span>
                        </div>
                        <div class="game-mode-item" id="lastMoveTwo">
                            <img id="lastMoveTwoIcon" src="img/chesspieces/alpha/bP.png" alt="" />
                            <span id="lastMoveTwoText">--</span>
                        </div>
                    </div>
                </div>

                <div id="chessPieceInfoBtn" class="game-piece-card" role="button" tabindex="0" aria-label="Open menu">
                    <div class="game-piece-icons">
                        <div class="game-piece-icon chesspiece-queen">
                            <img src="assets/img/chesspiece-queen-front.png" alt="" />
                        </div>
                        <div class="game-piece-icon chesspiece-knight">
                            <img src="assets/img/chesspiece-knight-front.png" alt="" />
                        </div>
                    </div>
                    <div class="game-piece-text">
                        <span>ChessPiece</span>
                        <img src="assets/img/chesspiece-arrow.svg" alt="" />
                    </div>
                </div>
            </div>

            <div id="board">
                <h1 class="vertical-align">✦ Loading ✦</h1>
            </div>

            <div class="left-side">
                <div class="game-action-row">
                    <button type="button" id="gameModeCardBtn" class="unbutton game-action-card game-action-mode" aria-label="Open game mode menu">
                        <img id="gameModeCardIcon" src="assets/img/game-person.svg" alt="" />
                        <span id="gameModeCardLabel">Solo</span>
                    </button>
                    <button class="unbutton game-action-card hint-btn" id="hintBtn">
                        <img src="assets/img/game-lightbulb.svg" alt="" />
                        <span>Hint</span>
                    </button>
                </div>

                <div id="turns" class="hide"></div>
                <div id="pgnBox" class="hide">
                    <p style=" display: flex; gap:4px; justify-content:flex-start; align-items:center; ">Last Moves <img width="24px" src="assets/img/arrow.png"></p>
                    <div id="pgn"></div>
                </div>
            </div>

            <div class="right-side">
                <div id="primaryActionRow" class="game-action-row">
                    <button id="resetBtn" class="unbutton game-action-card reset-btn">
                        <img src="assets/img/game-repeat.svg" alt="" />
                        <span>Restart</span>
                    </button>
                    <button id="quickSettingsToggleBtn" class="unbutton game-action-card setting-btn" aria-label="Settings">
                        <img src="assets/img/game-widgets.svg" alt="" />
                        <span>Settings</span>
                    </button>
                </div>
                <div id="quickSettingsPanel" class="quick-settings-panel hide" aria-label="Quick settings">
                    <button id="quickCloseBtn" class="unbutton quick-box quick-box-close">
                        <img src="assets/img/qs-close.svg" alt="" />
                        <span>Close</span>
                    </button>
                    <button id="quickBoardBtn" class="unbutton quick-box quick-box-light">
                        <img src="assets/img/qs-board.svg" alt="" />
                        <span id="quickBoardText">Board</span>
                    </button>
                    <button id="quickEasyBtn" class="unbutton quick-box quick-box-light">
                        <img src="assets/img/qs-swords.svg" alt="" />
                        <span id="quickEasyText">Easy</span>
                    </button>
                    <button id="quick3DBtn" class="unbutton quick-box quick-box-light">
                        <img src="assets/img/qs-cube.svg" alt="" />
                        <span id="quick3DText">3D</span>
                    </button>
                </div>
            </div>
        </div>



        <div class="menu-wrap">
            <div class="tiles hide-mo">
                <div class="tiles__line">
                    <div class="tiles__line-img" style="background-image:url(img/king.png)"></div>
                    <div class="tiles__line-img" style="background-image:url(img/queen.png)"></div>
                    <div class="tiles__line-img" style="background-image:url(img/bishop.png)"></div>
                    <div class="tiles__line-img" style="background-image:url(img/knight.png)"></div>
                    <div class="tiles__line-img" style="background-image:url(img/rock.png)"></div>
                    <div class="tiles__line-img" style="background-image:url(img/pawn.png)"></div>
                </div>

            </div>
          
            
            <nav class="menu">

                <a class="menu__item">
                    <h1 class="title1">Game Mode</h1>
                </a>
                <a class="menu__item">


                    <div class="gamemode">

                        <label>
                            <input type="radio" name="engineMenu" value="js/p4wn.js" data-level="easy" checked>
                            <span> easy </span>
                        </label>
                        <label>
                            <input type="radio" name="engineMenu" value="js/p4wn.js" data-level="medium">
                            <span> medium </span>
                        </label>
                        <label>
                            <input type="radio" name="engineMenu" value="js/lozza.js" data-level="hard">
                            <span> hard </span>
                        </label>

                        <button class="unbotton dueD menu__item "  id="dimensionBtn" value="2D"> 2D </button>


                    </div>

                </a>
               
                    

            </nav>
            <button class="unbutton button-close">
                <img src="assets/img/close.svg" alt="">
            </button>
        </div>
        
              
                    <div style=" display: none">
                                                <input class="unbotton" type="button" id="flipBtn" value="FLIP">


                        <label for="moveTime">MOVE TIME:</label>
                        <select id="moveTime">
                            <option value="1000">1</option>
                            <option value="2000">2</option>
                            <option value="5000" selected>5</option>
                            <option value="10000">10</option>
                            <option value="20000">20</option>
                        </select>
                        <br>
                        <label for="promotion">PROMOTE PAWNS TO:</label>
                        <select id="promotion">
                            <option value="q" selected>queens</option>
                            <option value="n">knights</option>
                            <option value="r">rooks</option>
                            <option value="b">bishops</option>
                        </select>
                    </div>
        <!-- From https://codepen.io/sebastien-gilbert/pen/VwLzvGV?editors=1010 -->

        <!-- Edit the paths here: https://yqnn.github.io/svg-path-editor/ -->
        <svg class="overlay" width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none">
            <path class="overlay__path" vector-effect="non-scaling-stroke" d="M 0 100 V 100 Q 50 100 100 100 V 100 z" />
        </svg>
    </main>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
    <script type="module" src="js/index.js"></script>
    
    
    <script>
 $( ".dueD" ).click(function() {
 $(this).toggleClass( "dueD-active" );
 });
</script>
    
</body></html>
